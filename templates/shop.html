{% extends 'base.html' %}
{% block title %}Cửa Hàng Son Môi | Lipstick Luxe{% endblock %}
{% block content %}

    <!-- PAGE HEADER -->
    <div style="margin-bottom: var(--sp-xxl);">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/">Trang Chủ</a>
            <span class="separator" aria-hidden="true">›</span>
            <span class="current" aria-current="page">Cửa Hàng</span>
        </nav>
        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: var(--sp-base);">
            <div>
                <span class="featured-tagline" style="text-align:left;">Khám Phá</span>
                <h1 style="font-family: var(--font-display); font-size: var(--type-display-lg); font-weight: 500; color: var(--ink-deep); line-height: 1.17; letter-spacing: 0; font-feature-settings: 'ss01','ss02';">Bộ Sưu Tập</h1>
            </div>

            <!-- Sort dropdown -->
            <div class="input-group" style="flex-direction: row; align-items: center; gap: var(--sp-md); min-width: 200px;">
                <label for="shop-sort" style="white-space: nowrap; margin-bottom: 0; font-size: var(--type-body-sm); font-weight: 700; color: var(--ink);">Sắp xếp:</label>
                <div class="select-wrapper" style="width: 180px;">
                    <select id="shop-sort" aria-label="Sắp xếp sản phẩm">
                        <option value="">Mặc định</option>
                        <option value="asc">Giá: Thấp → Cao</option>
                        <option value="desc">Giá: Cao → Thấp</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- SHOP LAYOUT: SIDEBAR + GRID -->
    <div class="shop-layout-grid">

        <!-- SIDEBAR FILTERS -->
        <aside class="glass-panel" style="padding: var(--sp-xxl); position: sticky; top: 80px;" aria-label="Bộ lọc sản phẩm">
            <h2 style="font-size: var(--type-body-sm); font-weight: 700; color: var(--ink-deep); margin-bottom: var(--sp-xxl); letter-spacing: -0.14px; text-transform: uppercase; border-bottom: 1px solid var(--hairline-soft); padding-bottom: var(--sp-md);">Bộ Lọc</h2>

            <!-- Keyword search -->
            <div class="input-group" style="margin-bottom: var(--sp-xl);">
                <label for="search-input">Tìm kiếm</label>
                <div class="search-input-wrapper">
                    <span class="search-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="search" id="search-input" placeholder="Tên son, hãng, mã màu..." autocomplete="off">
                </div>
            </div>

            <!-- Brand filter -->
            <div class="input-group" style="margin-bottom: var(--sp-xl);">
                <label for="brand-filter">Thương Hiệu</label>
                <div class="select-wrapper">
                    <select id="brand-filter">
                        <option value="">Tất cả thương hiệu</option>
                        <option value="Dior">Dior</option>
                        <option value="YSL">YSL</option>
                        <option value="Tom Ford">Tom Ford</option>
                        <option value="Gucci">Gucci</option>
                        <option value="MAC">MAC</option>
                        <option value="Hermes">Hermès</option>
                        <option value="Black Rouge">Black Rouge</option>
                        <option value="Romand">Romand</option>
                    </select>
                </div>
            </div>

            <!-- Color family filter -->
            <div class="input-group" style="margin-bottom: var(--sp-xl);">
                <label for="color-filter">Nhóm Màu Sắc</label>
                <div class="select-wrapper">
                    <select id="color-filter">
                        <option value="">Tất cả nhóm màu</option>
                        <option value="Đỏ">Đỏ (Red)</option>
                        <option value="Hồng">Hồng (Pink)</option>
                        <option value="Cam">Cam (Orange)</option>
                        <option value="San Hô">San Hô (Coral)</option>
                        <option value="Nude">Nude</option>
                        <option value="Đỏ Đất / Gạch">Đỏ Đất / Gạch</option>
                        <option value="Mận / Berry">Mận / Berry</option>
                    </select>
                </div>
            </div>

            <!-- Price tier filter -->
            <div class="input-group" style="margin-bottom: var(--sp-xxl);">
                <label for="price-filter">Phân Khúc Giá</label>
                <div class="select-wrapper">
                    <select id="price-filter">
                        <option value="">Tất cả mức giá</option>
                        <option value="Affordable">Bình dân (Romand…)</option>
                        <option value="Premium">Trung cấp (MAC…)</option>
                        <option value="Luxury">Cao cấp (Dior, YSL…)</option>
                        <option value="Ultra-Luxury">Siêu cao cấp (Hermès…)</option>
                    </select>
                </div>
            </div>

            <button class="btn-ghost" id="btn-reset-filters" style="width: 100%; justify-content: center;">
                Xóa Tất Cả Bộ Lọc
            </button>
        </aside>

        <!-- PRODUCT GRID AREA -->
        <section aria-label="Danh sách sản phẩm">
            <!-- Result count -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-xl); min-height: 32px;">
                <p id="shop-result-count" style="font-size: var(--type-body-sm); color: var(--slate); letter-spacing: -0.14px;" aria-live="polite"></p>
            </div>

            <div class="product-grid" id="shop-product-grid" role="list" style="min-height: 400px;">
                <!-- Loaded dynamically by JS -->
            </div>
        </section>

    </div>

{% endblock %}
