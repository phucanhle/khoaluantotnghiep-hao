<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5b083" />
      <stop offset="100%" stop-color="#a87f5a" />
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d84b63" />
      <stop offset="100%" stop-color="#801d2c" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#12080a" stroke="url(#gold)" stroke-width="2" />
  
  <!-- Lipstick cap/base -->
  <rect x="85" y="115" width="30" height="50" rx="3" fill="url(#gold)" />
  <rect x="82" y="125" width="36" height="5" fill="#0a0506" />
  
  <!-- Lipstick inner gold tube -->
  <rect x="90" y="85" width="20" height="30" fill="url(#gold)" opacity="0.8" />
  
  <!-- Lipstick bullet (red wax) -->
  <path d="M90,85 L90,55 Q90,45 100,45 Q110,45 110,55 L110,85 Z" fill="url(#rose)" />
  <path d="M90,70 L110,60 L110,85 L90,85 Z" fill="#ffffff" opacity="0.15" />
  
  <!-- Accent details -->
  <line x1="85" y1="145" x2="115" y2="145" stroke="#0a0506" stroke-width="2" />
</svg>
